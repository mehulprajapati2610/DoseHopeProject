<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Medicines — DoseHope</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="app.css">
</head>
<body>

<header class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="brand">
      <span class="brand-mark">
        <svg viewBox="0 0 32 32" width="26" height="26" fill="none">
          <path d="M16 3 C16 3 7 9 7 17 C7 23.5 11 28 16 28 C21 28 25 23.5 25 17 C25 9 16 3 16 3 Z" fill="#1B7A5C"/>
          <rect x="13.2" y="12.5" width="5.6" height="11" rx="1.4" fill="#F4FBF7"/>
          <rect x="10.5" y="15.2" width="11" height="5.6" rx="1.4" fill="#F4FBF7"/>
        </svg>
      </span>
      <span class="brand-name">DoseHope</span>
    </a>
    <nav class="nav-links" id="navLinksApp">
      <a href="index.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="donate.html" id="donateLink">Donate</a>
    </nav>
    <div class="nav-actions">
  <span class="btn btn-ghost" id="userPill"></span>
  <button class="btn btn-primary" id="logoutBtn">Log out</button>
</div>
  </div>
</header>

<section class="app-section">
  <div class="app-header">
    <span class="eyebrow eyebrow-dark">Available now</span>
    <h1>Browse Medicines</h1>
    <p class="section-sub">Search what's currently listed by donors across the network.</p>
  </div>

  <div class="browse-toolbar">
    <div class="form-field">
      <label for="filterCategory">Category</label>
      <select id="filterCategory">
        <option value="">All Categories</option>
        <option>Chronic Illness</option>
        <option>Pediatric</option>
        <option>First Aid</option>
        <option>Diabetes Care</option>
        <option>Cardiac Care</option>
        <option>Other</option>
      </select>
    </div>
    <div class="form-field">
      <label for="filterSearch">Search by name</label>
      <input type="text" id="filterSearch" placeholder="e.g. Paracetamol">
    </div>
    <div class="form-field">
      <label for="filterSort">Sort by</label>
      <select id="filterSort">
        <option value="newest">Newest first</option>
        <option value="expiry">Expiring soonest</option>
      </select>
    </div>
  </div>

  <div class="medicine-grid" id="medicineGrid"></div>
</section>

<!-- Request modal -->
<div class="modal-overlay" id="requestModal" hidden>
  <div class="modal-box">
    <h3 id="modalMedName">Request this medicine?</h3>
    <p id="modalMedDesc">This request will be sent under your organization's name.</p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="modalCancel">Cancel</button>
      <button class="btn btn-primary" id="modalConfirm">Send Request</button>
    </div>
  </div>
</div>

<script src="data-store.js"></script>
<script src="browse.js"></script>
</body>
</html>
